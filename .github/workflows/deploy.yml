name: Deploy Discord Bot

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    env:
      BOT_DIR: ${{ secrets.BOT_DIR }}
      GIT_TERMINAL_PROMPT: 0
    steps:
      - name: Pull latest code
        shell: bash
        run: |
          cd "$BOT_DIR"
          git fetch "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main
          git reset --hard origin/main

      - name: Stop Bot (release file locks)
        continue-on-error: true
        shell: bash
        run: pm2 stop runrunpomi

      - name: Wait for process cleanup
        shell: bash
        run: sleep 3

      - name: Install dependencies
        shell: bash
        run: |
          cd "$BOT_DIR"
          npm install --ignore-scripts

      - name: Type check
        shell: bash
        run: |
          cd "$BOT_DIR"
          npm run typecheck

      - name: Build
        shell: bash
        run: |
          cd "$BOT_DIR"
          npm run build

      - name: Start Bot
        shell: bash
        run: |
          cd "$BOT_DIR"
          pm2 start ecosystem.config.cjs --env production
