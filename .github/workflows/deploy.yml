name: Deploy Discord Bot

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    env:
      BOT_DIR: ${{ secrets.BOT_DIR }}
      GIT_TERMINAL_PROMPT: 0
    steps:
      - name: Pull latest code
        shell: pwsh
        run: |
          cd $env:BOT_DIR
          $token = "${{ secrets.GITHUB_TOKEN }}"
          $repo = "${{ github.repository }}"
          git fetch "https://x-access-token:${token}@github.com/${repo}.git" main
          git reset --hard origin/main

      - name: Stop Bot (release file locks)
        continue-on-error: true
        shell: pwsh
        run: pm2 stop runrunpomi

      - name: Wait for process cleanup
        shell: pwsh
        run: Start-Sleep -Seconds 3

      - name: Install dependencies
        shell: pwsh
        run: |
          cd $env:BOT_DIR
          npm install --ignore-scripts

      - name: Type check
        shell: pwsh
        run: |
          cd $env:BOT_DIR
          npm run typecheck

      - name: Build
        shell: pwsh
        run: |
          cd $env:BOT_DIR
          npm run build

      - name: Start Bot
        shell: pwsh
        run: |
          cd $env:BOT_DIR
          pm2 start ecosystem.config.cjs --env production
